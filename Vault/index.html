<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault — Tienda</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <a class="nav-brand" href="#" onclick="showPage('shop')">◇ Vault</a>
    <div class="nav-links">
      <button class="nav-link active" id="nav-shop" onclick="showPage('shop')">Tienda</button>
      <button class="nav-link" id="nav-admin" onclick="showPage('admin')">Admin ⚡</button>
    </div>
    <button class="cart-btn" id="cart-btn">
      <span class="cart-icon">⊕</span>
      <span>Carrito</span>
      <span class="cart-badge" id="cart-badge" style="display:none">0</span>
    </button>
  </nav>

  <!-- SHOP PAGE -->
  <div class="page" id="page-shop">
    <div class="shop-layout">
      <!-- Sidebar filtros -->
      <aside class="shop-sidebar">
        <div class="filter-group">
          <div class="filter-title">Categorías</div>
          <label class="filter-item"><input type="checkbox" value="all" checked onchange="filterProducts()"> Todas</label>
          <label class="filter-item"><input type="checkbox" value="tech" onchange="filterProducts()"> Tecnología</label>
          <label class="filter-item"><input type="checkbox" value="home" onchange="filterProducts()"> Hogar</label>
          <label class="filter-item"><input type="checkbox" value="fashion" onchange="filterProducts()"> Moda</label>
        </div>
        <div class="filter-group">
          <div class="filter-title">Precio máximo</div>
          <input type="range" min="0" max="500" value="500" id="price-range" oninput="updatePriceFilter(this.value)"/>
          <div class="price-label">Hasta <span id="price-label">500</span>€</div>
        </div>
        <div class="filter-group">
          <div class="filter-title">Ordenar por</div>
          <select id="sort-select" onchange="filterProducts()">
            <option value="default">Por defecto</option>
            <option value="price-asc">Precio: menor a mayor</option>
            <option value="price-desc">Precio: mayor a menor</option>
            <option value="name">Nombre A-Z</option>
          </select>
        </div>
      </aside>

      <!-- Grid productos -->
      <div class="shop-main">
        <div class="shop-header">
          <h1 class="shop-title">Productos</h1>
          <div class="search-bar">
            <input type="text" id="product-search" placeholder="Buscar producto..." oninput="filterProducts()"/>
          </div>
        </div>
        <div class="product-grid" id="product-grid"></div>
      </div>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div class="page" id="page-admin" style="display:none">
    <div class="admin-layout">
      <div class="admin-header">
        <h1>Panel de administración</h1>
        <button class="btn-primary" onclick="openProductModal()">+ Añadir producto</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="stat-products">0</div>
          <div class="stat-name">Productos</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-orders">0</div>
          <div class="stat-name">Pedidos simulados</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-revenue">0€</div>
          <div class="stat-name">Ingresos (demo)</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-stock">0</div>
          <div class="stat-name">Unidades en stock</div>
        </div>
      </div>

      <!-- Table -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="admin-table">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="admin-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- CARRITO -->
  <div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()"></div>
  <div class="cart-panel" id="cart-panel">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-empty" id="cart-empty">
      <div>⊕</div>
      <p>Tu carrito está vacío</p>
    </div>
    <div class="cart-footer" id="cart-footer" style="display:none">
      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total-price">0€</span>
      </div>
      <button class="btn-checkout" onclick="checkout()">Finalizar compra (demo)</button>
    </div>
  </div>

  <!-- PRODUCT MODAL (admin) -->
  <div class="modal-overlay" id="product-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="product-modal-title">Nuevo producto</h2>
        <button onclick="closeProductModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-product-id"/>
        <div class="field"><label>Nombre</label><input type="text" id="edit-name" placeholder="Nombre del producto"/></div>
        <div class="field"><label>Precio (€)</label><input type="number" id="edit-price" min="0" step="0.01"/></div>
        <div class="field">
          <label>Categoría</label>
          <select id="edit-category">
            <option value="tech">Tecnología</option>
            <option value="home">Hogar</option>
            <option value="fashion">Moda</option>
          </select>
        </div>
        <div class="field"><label>Stock</label><input type="number" id="edit-stock" min="0"/></div>
        <div class="field"><label>Descripción</label><textarea id="edit-desc" rows="3"></textarea></div>
        <div class="field"><label>Emoji del producto</label><input type="text" id="edit-emoji" placeholder="📱"/></div>
      </div>
      <div class="modal-footer">
        <button onclick="closeProductModal()" class="btn-secondary">Cancelar</button>
        <button onclick="saveProduct()" class="btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
